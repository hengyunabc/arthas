name: Update Assets on gh-pages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version number to download and update (e.g., 4.0.3)"
        required: true

jobs:
  update-assets:
    runs-on: ubuntu-latest

    steps:
      # 步骤 1：检出 gh-pages 分支的代码
      - name: Checkout gh-pages branch
        uses: actions/checkout@v3
        with:
          ref: gh-pages

      # 步骤 2：下载指定版本的 ZIP 文件到 /tmp 目录
      - name: Download ZIP file
        run: |
          VERSION=${{ github.event.inputs.version }}
          DOWNLOAD_URL="https://repo1.maven.org/maven2/com/taobao/arthas/arthas-packaging/${VERSION}/arthas-packaging-${VERSION}-doc.zip"
          echo "Downloading from $DOWNLOAD_URL"
          curl -L "$DOWNLOAD_URL" -o "/tmp/arthas-doc.zip"

      # 步骤 3：解压下载的文件
      - name: Unzip downloaded file
        run: |
          unzip /tmp/arthas-doc.zip -d /tmp/arthas-doc

      # 步骤 4：删除仓库中的 assets 目录
      - name: Remove assets directory
        run: |
          rm -rf assets

      # 步骤 5：复制解压后的文件到仓库
      - name: Copy files to repository
        run: |
          cp -r /tmp/arthas-doc/* ./

      # 步骤 6：设置 Git 用户信息
      - name: Set Git user
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      # 步骤 7：提交并推送更改到远程仓库
      - name: Commit and push changes
        run: |
          git add .
          git commit -m "Update docs to version ${{ github.event.inputs.version }}"
          git push origin gh-pages
